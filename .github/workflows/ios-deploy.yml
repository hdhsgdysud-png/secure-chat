name: Deploy FALCON to App Store Connect

on:
  push:
    branches:
      - main
  workflow_dispatch: # İstediğin zaman manuel tetiklemeni sağlar

jobs:
  build-and-deploy-ios:
    runs-on: macos-latest # 2026'nın en güncel Mac sunucusunu kullanır

    steps:
      - name: 1. Kodlari Cek (Checkout)
        uses: actions/checkout@v4

      - name: 2. Xcode 26 Secimi (iOS 26 SDK)
        # Apple'ın 2026'da zorunlu kıldığı SDK sürümü için Xcode 26'yı aktif eder
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: 3. Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 4. NPM Paketlerini Yukle
        run: npm install

      - name: 5. Next.js Web Uygulamasini Derle
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
          NEXT_PUBLIC_PUSHER_KEY: ${{ secrets.NEXT_PUBLIC_PUSHER_KEY }}
          PUSHER_SECRET: ${{ secrets.PUSHER_SECRET }}
          NEXT_PUBLIC_PUSHER_CLUSTER: ${{ secrets.NEXT_PUBLIC_PUSHER_CLUSTER }}
        run: npm run build

      - name: 6. Capacitor ile iOS Klasorunu Guncelle
        run: npx cap sync ios

      - name: 7. Apple Sertifikalarini Kasadan Cikarip Kur
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Base64 sifreleri tekrar dosyaya cevir
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Sanal Mac uzerinde gecici bir anahtarlik (keychain) olustur
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # P12 Sertifikasini bu anahtarliga yukle
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Provisioning Profile (Ucus Izni) dosyasini Apple'in bekledigi klasore kopyala
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 8. Disa Aktarim Icin ExportOptions Olustur
        run: |
          cat <<EOF > ios/App/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>teamID</key>
              <string>9SBP4T3LFM</string>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.scc.falcon</key>
                  <string>Falcon Profile</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: 9. Xcode ile iOS Uygulamasini Arsivle
        # PRODUCT_BUNDLE_IDENTIFIER zorlaması ile com.spicy vs com.scc hatasını çözer
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            clean archive \
            DEVELOPMENT_TEAM=9SBP4T3LFM \
            PRODUCT_BUNDLE_IDENTIFIER=com.scc.falcon \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Falcon Profile"

      - name: 10. IPA (Uygulama Paketi) Dosyasini Disari Cikar
        run: |
          cd ios/App
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath build

      - name: 11. Apple Sunucularina (TestFlight) Firlat!
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # P8 anahtarini Apple'in istedigi gizli klasore kaydet
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          
          # IPA dosyasini Apple'a gonder
          xcrun altool --upload-app -f ios/App/build/App.ipa -t ios --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"